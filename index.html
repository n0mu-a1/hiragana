<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#fff7e6">
  <title>おとあて</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="icon.svg">
  <link rel="apple-touch-icon" sizes="180x180" href="icon-180.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="app" aria-live="polite">
    <section id="screen-start" class="screen screen-start" data-screen>
      <h1 id="app-title" class="title">おとあて</h1>
      <div class="mode-row">
        <button id="btn-script-hira" class="mode-button" type="button">
          <span class="mode-kana">あ</span><span class="mode-label">ひらがな</span>
        </button>
        <button id="btn-script-kata" class="mode-button" type="button">
          <span class="mode-kana">ア</span><span class="mode-label">カタカナ</span>
        </button>
      </div>
    </section>

    <section id="screen-modes" class="screen screen-start hidden" data-screen>
      <div class="mode-row">
        <button id="btn-mode-sei" class="mode-button" type="button">
          <span id="glyph-sei" class="mode-kana">あ</span><span class="mode-label">せいおん</span>
        </button>
        <button id="btn-mode-daku" class="mode-button" type="button">
          <span id="glyph-daku" class="mode-kana">が</span><span class="mode-label">だくおん</span>
        </button>
        <button id="btn-mode-han" class="mode-button" type="button">
          <span id="glyph-han" class="mode-kana">ぱ</span><span class="mode-label">はんだくおん</span>
        </button>
      </div>
      <button id="btn-modes-back" class="small-action" type="button">← もどる</button>
    </section>

    <section id="screen-quiz" class="screen screen-quiz hidden" data-screen>
      <div class="topbar">
        <button id="btn-home" class="icon-button" type="button" aria-label="🏠">🏠</button>
        <div id="progress" class="progress" aria-label="はなまる"></div>
        <button id="btn-replay" class="sound-button" type="button">🔊 もういちど</button>
      </div>
      <div id="choices" class="choices" aria-label="こたえ"></div>
      <div id="flower" class="flower hidden" aria-hidden="true">💮</div>
    </section>

    <section id="screen-result" class="screen screen-result hidden" data-screen>
      <div id="result-mark" class="result-mark"></div>
      <p id="result-text" class="result-text">はなまる</p>
      <div class="feedback-panel">
        <p id="feedback-heading" class="feedback-heading">むずかしさは どうでしたか？</p>
        <div class="rating-row" role="group" aria-label="むずかしさ">
          <button class="rating-button" type="button" data-rating="easy">かんたん</button>
          <button class="rating-button" type="button" data-rating="just">ちょうどいい</button>
          <button class="rating-button" type="button" data-rating="hard">むずかしい</button>
        </div>
        <button id="fb-submit" class="small-action" type="button">OK</button>
        <p id="fb-thanks" class="thanks hidden">ありがとう！</p>
      </div>
      <button id="btn-retry" class="primary-action" type="button">▶ もういちど</button>
    </section>
  </main>

  <script src="data/kana.js"></script>
  <script src="game-config.js"></script>
  <script src="feedback.js"></script>
  <script src="game.js"></script>
  <script src="report.js"></script>
  <script>
    if ("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js");
  </script>
</body>
</html>
